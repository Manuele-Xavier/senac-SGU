<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1" name="viewport"/>
  <link href="../styles.css" rel="stylesheet"/>
  <title>
   Lançar Notas (Docente)
  </title>
 </head>
 <body>
  <div class="shell phone-wrap">
   <div class="phone">
    <div class="screen">
     <div class="statusbar">
      <span>
       9:41
      </span>
      <span>

      </span>
     </div>

       </option>

     </div>
     <div style="height:12px">
     </div>

       Notas
      </div>
      <table class="mobile-table">

         <th>

        </tr>
       </thead>
       <tbody>
        <tr>
         <td>
          João da Silva
         </td>

         <td>

         </td>
        </tr>
        <tr>
         <td>
          Maria Oliveira
         </td>

          </span>

        <tr>

          </span>

        </tr>
        <tr>
         <td>
          Ana Beatriz Lima
         </td>
         <td>
          <input class="input" value="6,0"/>
         </td>
         <td>
          <span class="status ok">
           OK
          </span>
         </td>
        </tr>
        <tr>
         <td>
          Juliana Martins
         </td>
         <td>
          <input class="input" value="8,0"/>
         </td>
         <td>
          <span class="status ok">
           OK
          </span>
         </td>
        </tr>
       </tbody>
      </table>
      <div style="height:12px">
      </div>
      <button class="btn primary" style="width:100%">
       Salvar notas
      </button>
     </div>
     <nav class="mobile-bottom">
      <a class="" href="../index.html">
       Início
      </a>
      <a class="active" href="../index.html">
       Acadêmico
      </a>
      <a class="" href="../index.html">
       Pessoas
      </a>
      <a class="" href="../index.html">

     </nav>
    </div>
   </div>

</html>
