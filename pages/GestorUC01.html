<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Gestor - UC01</title>
        <link rel="stylesheet" href="../css/globals.css">
        <link rel="stylesheet" href="../css/GestorUC01.css">
    </head>
    <body>
        <div class="gestor">
            <header class="main-header">
                <div class="logo">
                    <span class="logo-text">LOGO</span>
                </div>
                <h1 class="system-title">SISTEMA DE GESTÃO UNIVERSITÁRIA</h1>
                <input type="checkbox" id="menu-toggle" class="menu-toggle">
                <label for="menu-toggle" class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <nav class="nav-menu">
                    <a href="#">INÍCIO</a>
                    <a href="#">CADASTROS</a>
                    <a href="#">TURMAS</a>
                    <a href="#">FORNECEDORES</a>
                </nav>
                <div class="perfil-section">
                    <img class="perfil-logo" src="../source/Perfil logo.svg" alt="Perfil"/>
                    <div class="perfil-info">
                        <span class="text-wrapper-17">Perfil</span>
                        <span class="text-wrapper-18">Gestor</span>
                    </div>
                    <img class="mask-group" src="../source/Triangulo.svg" alt="Seta"/>
                </div>
            </header>

            <main class="janela-cadastro-wrapper">
                <section class="janela-cadastro">
                    <header class="card-header-blue"> 
                        <h2 class="text-wrapper-19">Aluno - Cadastro</h2>
                    </header>

                    <form class="cadastro-form">
                        <div class="form-grid">
                            <div class="input-field"><label>NOME COMPLETO DO ALUNO</label><input type="text"></div>
                            <div class="input-field"><label>ENDEREÇO</label><input type="text"></div>
                            <div class="input-field"><label>CURSO MATRICULADO</label><input type="text"></div>
                            <div class="input-field"><label>CPF</label><input type="text"></div>
                            <div class="input-field"><label>CEP</label><input type="text"></div>
                            <div class="input-field"><label>TURMA</label><input type="text"></div>
                            <div class="input-field"><label>SEMESTRE</label><input type="text"></div>
                            <div class="input-field"><label>ÓRGÃO EXPEDIDOR</label><input type="text"></div>
                            <div class="input-field"><label>CIDADE</label><input type="text"></div>
                            <div class="input-field"><label>DATA DE EMISSÃO</label><input type="date"></div>
                            <div class="input-field"><label>ESTADO</label><input type="text"></div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-cadastrar">
                                <img class="lets-icons-check" src="../source/IconCheck.svg" alt=""/>
                                CADASTRAR
                            </button>
                            <button type="button" class="btn-cancelar" onclick="history.back()">CANCELAR</button>
                        </div>
                    </form>
                </section>
            </main>

            <footer class="main-footer">
                <p class="p-1">© Turma 02 - PI Tecnologia de Sistemas para Internet EAD 2026</p>
            </footer>
        </div>
    </body>
</html>
