<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1" name="viewport"/>
  <link href="../styles.css" rel="stylesheet"/>
  <title>
   Login
  </title>
 </head>
 <body>
  <div class="shell phone-wrap">
   <div class="phone">
    <div class="screen">
     <div class="statusbar">
      <span>
       9:41
      </span>
      <span>
       ● ● ●
      </span>
     </div>
     <div class="mobile-header">
      <div>
       <div class="mobile-title">
        Login
       </div>
       <div class="mobile-sub">
        Protótipos mobile baseados na entrega 1
       </div>
      </div>
      <div class="badge active">
       SGU
      </div>
     </div>
     <div class="mobile-card pad" style="margin-top:4px">
      <div class="badge active">
       Entrar
      </div>
      <div style="height:12px">
      </div>
      <label>
       E-mail
      </label>
      <input class="input" placeholder="usuario@universidade.edu.br"/>
      <div style="height:10px">
      </div>
      <label>
       Senha
      </label>
      <input class="input" placeholder="Digite sua senha" type="password"/>
      <div class="small subtle" style="text-align:right;margin-top:8px">
       Esqueceu sua senha?
      </div>
      <div style="height:12px">
      </div>
      <button class="btn primary" style="width:100%">
       Entrar
      </button>
      <div style="display:flex;align-items:center;gap:10px;margin:12px 0">
       <div style="flex:1;height:1px;background:var(--line)">
       </div>
       <span class="small subtle">
        ou
       </span>
       <div style="flex:1;height:1px;background:var(--line)">
       </div>
      </div>
      <button class="btn ghost" style="width:100%">
       SSO institucional
      </button>
     </div>
     <nav class="mobile-bottom">
      <a class="" href="../index.html">
       Início
      </a>
      <a class="active" href="../index.html">
       Acadêmico
      </a>
      <a class="" href="../index.html">
       Pessoas
      </a>
      <a class="" href="../index.html">
       Mais
      </a>
     </nav>
    </div>
   </div>
  </div>
 </body>
</html>
