<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Gestor Homepage</title>
        <link rel="stylesheet" href="../css/globals.css">
        <link rel="stylesheet" href="../css/Gestor.css">
    </head>
    <body>
        <div class="gestor-view">
            <header class="main-header">
                <div class="logo">
                    <span class="logo-text">LOGO</span>
                </div>
                <h1 class="system-title">SISTEMA DE GESTÃO UNIVERSITÁRIA</h1>
                <input type="checkbox" id="menu-toggle" class="menu-toggle">
                <label for="menu-toggle" class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <nav class="nav-menu">
                    <a href="#">INÍCIO</a>
                    <a href="#">CADASTROS</a>
                    <a href="#">TURMAS</a>
                    <a href="#">FORNECEDORES</a>
                </nav>
                <div class="perfil-section">
                    <img class="perfil-logo" src="../source/Perfil logo.svg" alt="Perfil"/>
                    <div class="perfil-info">
                        <span class="text-wrapper-40">Perfil</span>
                        <span class="text-wrapper-41">Gestor</span>
                    </div>
                    <img class="mask-group" src="../source/Triangulo.svg" alt="Seta"/>
                </div>
            </header>

            <main class="body-2">
                <aside class="sidebar-filters">
                    <button class="filter-btn">PF / PJ</button>
                    <button class="filter-btn">FORNECEDORES</button>
                    <button class="filter-btn">DOCENTES</button>
                    <button class="filter-btn">ALUNOS</button>
                    <button class="filter-btn">VALIDAÇÃO CADASTRAL</button>
                </aside>

                <section class="grid-cadastros">
                    <article class="janela-cadastro">
                        <h2 class="card-header">Docentes</h2>
                        <div class="card-actions">
                            <button class="btn-action">+CADASTRAR DOCENTE</button>
                            <button class="btn-action">GERENCIAR DOCENTES</button>
                        </div>
                    </article>

                    <article class="janela-cadastro">
                        <h2 class="card-header">Alunos</h2>
                        <div class="card-actions">
                            <button class="btn-action">+CADASTRAR ALUNO</button>
                            <button class="btn-action">GERENCIAR ALUNOS</button>
                        </div>
                    </article>

                    <article class="janela-cadastro">
                        <h2 class="card-header">Turmas</h2>
                        <div class="card-actions">
                            <button class="btn-action">+CADASTRAR TURMA</button>
                            <button class="btn-action">GERENCIAR TURMAS</button>
                        </div>
                    </article>

                    <article class="janela-cadastro">
                        <h2 class="card-header">Funcionários</h2>
                        <div class="card-actions">
                            <button class="btn-action">+CADASTRAR PF/PJ</button>
                            <button class="btn-action">GERENCIAR FUNCIONÁRIOS</button>
                        </div>
                    </article>

                    <article class="janela-cadastro">
                        <h2 class="card-header">Fornecedores</h2>
                        <div class="card-actions">
                            <button class="btn-action">+CADASTRAR FORNECEDOR</button>
                            <button class="btn-action">GERENCIAR FORNECEDOR</button>
                        </div>
                    </article>
                </section>
            </main>

            <footer class="main-footer">
                <p class="p-1">© Turma 02 - PI Tecnologia de Sistemas para Internet EAD 2026</p>
            </footer>
        </div>
    </body>
</html>
